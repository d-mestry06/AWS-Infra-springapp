name: CI Pipeline
on:
  workflow_dispatch:
  push:
    branches:
      - main
      
env:
  DOCKER_IMAGE: dmestry06/task-manager-app:${{ github.sha }}
  MAVEN_OPTS: "-DskipTests=true"      

jobs:
  build:
    uses: ./.github/workflows/javabuild.yml
    secrets: inherit
       
  test:
    uses: ./.github/workflows/test.yml
    needs: sonar
    secrets: inherit

  sonar:
     uses: ./.github/workflows/sonar.yml
     needs: build
     secrets: inherit  

  imagepush:
    uses: ./.github/workflows/imagepush.yml
    needs: test
    secrets: inherit  