# ── Server ──────────────────────────────────────────────────
server.port=80

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT:localhost}:3306/taskmanager?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskmanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskmanager}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection pool ──────────────────────────────────────────
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never